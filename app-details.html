    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #1a73e8;
            --primary-dark: #1557b0;
            --secondary: #00c853;
            --background: #ffffff;
            --surface: #ffffff;
            --text-primary: #0f0f0f;
            --text-secondary: #606060;
            --divider: #e5e5e5;
            --shadow-1: 0 1px 2px rgba(0,0,0,0.1);
            --link-color: #065fd4;
            --link-bg: #e8f0fe;
            --star-color: #ffc107;
            --star-empty: #ddd;
            --highlight-bg: #fff8e1;
            --reply-bg: #f9f9f9;
            --comment-text-color: #0f0f0f;
        }
        
        [data-theme="dark"] {

            --surface: #121A2A;
            --text-primary: #f1f1f1;
            --text-secondary: #aaa;
            --divider: #333;
            --link-color: #3ea6ff;
            --link-bg: #1a3a5c;

            --highlight-bg: #2d2a1e;

            --comment-text-color: #f1f1f1;
        }
        
        body {

            background: var(--background);
            color: var(--text-primary);
            min-height: 100vh;
            padding-bottom: 100px;
        }
        
        /* App Bar */
        .app-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: var(--surface);
            display: flex;
            align-items: center;
            padding: 0 16px;
            box-shadow: var(--shadow-1);
            z-index: 100;
        }
        
        .back-btn, .share-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: transparent;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        
        .back-btn:hover, .share-btn:hover {
            background: rgba(0,0,0,0.05);
        }
        
        .back-btn .material-icons, .share-btn .material-icons {
            font-size: 24px;
            color: var(--text-primary);
        }
        
        .app-title {
            flex: 1;
            font-size: 20px;
            font-weight: 600;
            margin-left: 16px;
        }
        
        /* Main Content */
        .main-content {
            margin-top: 56px;
        }
        
        /* App Header */
        .app-header {
            background: var(--surface);
            padding: 24px;
            display: flex;
            gap: 20px;
            position: relative;
        }
        
        .app-icon-large {
            width: 100px;
            height: 100px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: var(--shadow-1);
            flex-shrink: 0;
        }
        
        .app-icon-large img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .app-info {
            flex: 1;
            min-width: 0;
        }
        
        .app-name-large {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;

        .app-rating-large {

            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        
        .app-rating-large .material-icons {
            font-size: 18px;
            color: var(--star-color);
        }

            top: 16px;
            right: 16px;
        }

            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: all 0.2s;
            box-shadow: var(--shadow-1);

        .screenshot-item img {

        .lightbox {

            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .lightbox.active {
            display: flex;
            opacity: 1;
        }
        
        .lightbox-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .lightbox-img {

            max-height: 85vh;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            transform: scale(0.8);
            transition: transform 0.3s ease;
        }
        
        .lightbox.active .lightbox-img {
            transform: scale(1);
        }
        
        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 1001;
            transition: background 0.2s;
        }
        
        .lightbox-close:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .lightbox-close .material-icons {
            font-size: 28px;
        }
        
        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transition: background 0.2s;
            z-index: 1001;
        }
        
        .lightbox-nav:hover {
            background: rgba(255, 255, 255, 0.25);
        }
        
        .lightbox-nav.prev {
            left: 20px;
        }
        
        .lightbox-nav.next {
            right: 20px;
        }
        
        .lightbox-nav .material-icons {
            font-size: 32px;
        }
        
        .lightbox-counter {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);

            font-size: 14px;
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 500;

        /* Description */

        .user-rating-section {

            padding-top: 24px;
            margin-top: 24px;
        }
        
        .user-rating-title {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 16px;
            color: var(--text-primary);

            gap: 12px;

            gap: 8px;

        .star-btn {

            border: none;
            cursor: pointer;
            padding: 4px;
            transition: transform 0.2s;
            position: relative;
        }
        
        .star-btn:hover {

        }
        
        .star-btn .material-icons {
            font-size: 40px;
            color: var(--star-empty);
            transition: color 0.2s;
        }
        
        .star-btn.active .material-icons {
            color: var(--star-color);
        }
        
        .rating-label {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
            min-height: 20px;
        }
        
        /* ===== COMMENTS SECTION - CLEAN DESIGN ===== */
        .comments-section {
            background: var(--surface);
            padding: 16px;
            margin-top: 8px;
        }
        
        .comments-header {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 24px;
        }
        
        .comments-count {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-primary);
        }
        
        /* Comment Input Box */
        .comment-input-wrapper {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
        }
        
        .user-avatar {
            width: 40px;
            height: 40px;

            display: flex;

            flex-shrink: 0;

            font-weight: 500;

            overflow: hidden;

        .user-avatar img {

            height: 100%;
            object-fit: cover;
        }
        
        .comment-input-area {

        }
        
        .comment-input {
            width: 100%;

            background: transparent;
            font-size: 14px;
            color: var(--text-primary);
            resize: none;
            font-family: inherit;
            outline: none;
            min-height: 24px;
            padding: 8px 0;
            transition: border-color 0.2s;

        .comment-input:focus {

        .comment-actions-row {

            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .comment-btn-cancel {
            background: transparent;
            color: var(--text-secondary);
        }
        
        .comment-btn-cancel:hover {

        }
        
        .comment-btn-submit {
            background: var(--primary);
            color: white;
        }
        
        .comment-btn-submit:hover:not(:disabled) {
            background: var(--primary-dark);
        }
        
        .comment-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* ===== MAIN COMMENTS LIST ===== */
        .comments-list {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        
        /* ===== MAIN COMMENT THREAD ===== */
        .comment-thread {

            padding-bottom: 16px;

        }
        
        /* Bina reply wale comment mein border hatane ke liye */
        .comment-thread:last-child {

        }
        
        .comment-avatar {
            width: 40px;
            height: 40px;

            cursor: pointer;

        .comment-avatar img {

            height: 100%;
            object-fit: cover;

        .comment-body {

        }
        
        .comment-header {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-bottom: 4px;
            flex-wrap: wrap;
        }
        
        .comment-author {

            font-size: 13px;

        .comment-time {

            background: transparent;
            color: var(--text-secondary);

            border-radius: 50%;
            transition: all 0.2s;
            font-size: 12px;

        .action-btn:hover {

        }
        
        .action-btn .material-icons {
            font-size: 20px;

        .action-btn.liked {

        .comment-thread:hover .more-options {

        function linkifyText(text) {
            if (!text) return '';
            const urlPattern = /(https?:\/\/[^\s]+)|(www\.[^\s]+)|([a-zA-Z0-9._-]+\.[a-zA-Z]{2,}\/[^\s]*)/g;
            return text.replace(urlPattern, function(url) {
                let fullUrl = url;
                if (!url.startsWith('http')) {
                    fullUrl = 'https://' + url;
                }
                return `<a href="${fullUrl}" target="_blank" rel="noopener noreferrer" onclick="event.stopPropagation()">${url}</a>`;
            });
        }

        // Format time remaining
        function formatTimeRemaining(bytesUploaded, bytesTotal, elapsedMs) {
            if (bytesUploaded === 0) return 'Calculating...';
            const speed = bytesUploaded / (elapsedMs / 1000); // bytes per second
            const remainingBytes = bytesTotal - bytesUploaded;
            const remainingSeconds = Math.ceil(remainingBytes / speed);
            
            if (remainingSeconds < 60) {
                return `${remainingSeconds}s remaining`;
            } else {
                const mins = Math.floor(remainingSeconds / 60);
                const secs = remainingSeconds % 60;
                return `${mins}m ${secs}s remaining`;
            }
        }
        
        // Update progress overlay

            const progressText = document.querySelector(`#${elementId} .upload-progress-text`);
            const progressTime = document.querySelector(`#${elementId} .upload-progress-time`);
            if (progressText) progressText.textContent = `${percent}%`;
            if (progressTime) progressTime.textContent = timeText;
        }
        
        // Upload image to ImgBB with XMLHttpRequest for progress tracking
        function uploadToImgBB(file, onProgress) {
            return new Promise((resolve, reject) => {
                const formData = new FormData();
                formData.append('image', file);
                formData.append('key', IMGBB_API_KEY);
                
                uploadStartTime = Date.now();
                uploadProgress = 0;
                
                const xhr = new XMLHttpRequest();
                
                xhr.upload.addEventListener('progress', (event) => {
                    if (event.lengthComputable) {
                        const percent = Math.round((event.loaded / event.total) * 100);
                        uploadProgress = percent;
                        const elapsed = Date.now() - uploadStartTime;
                        const timeText = formatTimeRemaining(event.loaded, event.total, elapsed);
                        onProgress(percent, timeText);
                    }
                });
                
                xhr.addEventListener('load', () => {
                    if (xhr.status === 200) {
                        try {
                            const data = JSON.parse(xhr.responseText);
                            if (data.success) {
                                resolve(data.data.url);
                            } else {
                                reject(new Error(data.error?.message || 'Upload failed'));
                            }
                        } catch (e) {
                            reject(new Error('Invalid response'));
                        }
                    } else {
                        reject(new Error(`HTTP ${xhr.status}`));
                    }
                });
                
                xhr.addEventListener('error', () => reject(new Error('Network error')));
                xhr.addEventListener('abort', () => reject(new Error('Upload aborted')));
                
                xhr.open('POST', 'https://api.imgbb.com/1/upload');
                xhr.send(formData);
            });
        }

        function renderStaticStars(rating) {
            const fullStars = Math.floor(rating);
            const hasHalf = rating % 1 >= 0.5;
            let html = '';
            
            for (let i = 1; i <= 5; i++) {
                if (i <= fullStars) {
                    html += '<span class="material-icons" style="color: var(--star-color); font-size: 20px;">star</span>';
                } else if (i === fullStars + 1 && hasHalf) {
                    html += '<span class="material-icons" style="color: var(--star-color); font-size: 20px;">star_half</span>';
                } else {
                    html += '<span class="material-icons" style="color: var(--star-empty); font-size: 20px;">star_border</span>';
                }
            }
            return html;
        }
        
        function updateRatingBars() {
            const total = Object.values(ratingDistribution).reduce((a, b) => a + b, 0);
            if (total === 0) return;
            
            [5, 4, 3, 2, 1].forEach(star => {
                const count = ratingDistribution[star];
                const percentage = (count / total) * 100;
                const bar = document.getElementById(`bar-${star}`);
                if (bar) {
                    setTimeout(() => {
                        bar.style.width = percentage + '%';
                    }, 100);
                }
            });
        }

            stars.forEach((star, index) => {

                if (!snapshot.val()) {
                    userViewRef.set(true);
                    database.ref(`apps/${appId}/views`).transaction(current => (current || 0) + 1);
                }
            });
        }
        
        function checkUserActions() {
            if (!currentUser) return;
            
            database.ref(`appLikes/${appId}/${currentUser.id}`).once('value').then(snapshot => {
                hasLiked = snapshot.val() === true;
                updateLikeButton();
            });
            
            database.ref(`appRatings/${appId}/${currentUser.id}`).once('value').then(snapshot => {
                userRating = snapshot.val() || 0;
                resetStar();
            });
        }
        
        function toggleLike() {
            if (!currentUser) {
                showToast('Please login to like');
                return;
            }
            
            const likeRef = database.ref(`appLikes/${appId}/${currentUser.id}`);
            const likesCountRef = database.ref(`apps/${appId}/likes`);
            
            if (hasLiked) {
                likeRef.remove();
                likesCountRef.transaction(current => Math.max(0, (current || 0) - 1));
                hasLiked = false;
            } else {
                likeRef.set(true);
                likesCountRef.transaction(current => (current || 0) + 1);
                hasLiked = true;
            }
            
            updateLikeButton();
        }
        
        function updateLikeButton() {
            const btn = document.getElementById('likeBtn');
            const text = document.getElementById('likeText');
            if (!btn || !text) return; // Safety check
            
            if (hasLiked) {
                btn.classList.add('btn-liked');
                btn.classList.remove('btn-secondary');
                text.textContent = 'Liked';
            } else {
                btn.classList.remove('btn-liked');
                btn.classList.add('btn-secondary');
                text.textContent = 'Like';
            }
        }
        
        function rateApp(rating) {
            if (!currentUser) {
                showToast('Please login to rate');
                return;
            }
            
            userRating = rating;
            database.ref(`appRatings/${appId}/${currentUser.id}`).set(rating);
            
            database.ref(`appRatings/${appId}`).once('value').then(snapshot => {
                const ratings = snapshot.val() || {};
                const values = Object.values(ratings);
                const average = values.reduce((a, b) => a + b, 0) / values.length;
                database.ref(`apps/${appId}`).update({
                    rating: average.toFixed(1),
                    ratingsCount: values.length
                });
                
                loadRatingDistribution();
            });
            
            resetStar();
            showToast(`Rated ${rating} stars!`);
        }
        
        function downloadApp() {
            if (!currentUser) {
                showToast('Please login to download');
                return;
            }
            
            database.ref(`userDownloads/${currentUser.id}/${appId}`).once('value').then(snapshot => {
                if (!snapshot.val()) {
                    database.ref(`userDownloads/${currentUser.id}/${appId}`).set(true);
                    database.ref(`apps/${appId}/downloads`).transaction(current => (current || 0) + 1);
                    database.ref(`stats/totalDownloads`).transaction(current => (current || 0) + 1);
                    database.ref(`users/${currentUser.id}/downloads`).transaction(current => (current || 0) + 1);
                }
                
                if (appData.downloadUrl) {
                    window.open(appData.downloadUrl, '_blank');
                } else {
                    showToast('Download link not available');
                }
            });
        }
        
        function postComment() {
            if (!currentUser) {
                showToast('Please login to comment');
                return;
            }
            
            const text = document.getElementById('commentInput').value.trim();
            if (!text) {
                showToast('Please write a comment');
                return;
            }
            
            const commentRef = database.ref(`comments/${appId}`).push();
            commentRef.set({
                userId: currentUser.id,
                userName: currentUser.name || 'Anonymous',
                text: text,
                timestamp: Date.now(),
                likes: {}
            });
            
            document.getElementById('commentInput').value = '';
            cancelComment();
            showToast('Comment posted!');
        }
        
        // YouTube Style Reply System
        function toggleReplyInput(commentId, parentReplyId = null, replyToName = null) {
            if (!currentUser) {
                showToast('Please login to reply');
                return;
            }
            
            const inputId = parentReplyId ? `replyInput-${commentId}-${parentReplyId}` : `replyInput-${commentId}`;
            let replyContainer = document.getElementById(inputId);
            
            // Close other open inputs
            if (activeReplyInput && activeReplyInput !== inputId) {
                const prevContainer = document.getElementById(activeReplyInput);
                if (prevContainer) {
                    prevContainer.classList.remove('active');
                    prevContainer.innerHTML = '';
                }
            }
            
            if (!replyContainer) {
                replyContainer = document.createElement('div');
                replyContainer.id = inputId;
                replyContainer.className = 'reply-input-container';
                
                const insertAfter = parentReplyId ? 
                    document.getElementById(`reply-${parentReplyId}`) : 
                    document.getElementById(`comment-${commentId}`).querySelector('.comment-body');
                
                if (insertAfter) {
                    if (parentReplyId) {
                        insertAfter.parentNode.insertBefore(replyContainer, insertAfter.nextSibling);
                    } else {
                        const actionsBar = insertAfter.querySelector('.comment-actions-bar');
                        actionsBar.parentNode.insertBefore(replyContainer, actionsBar.nextSibling);
                    }
                }
            }
            
            if (replyContainer.classList.contains('active')) {
                replyContainer.classList.remove('active');
                replyContainer.innerHTML = '';
                activeReplyInput = null;
            } else {
                const avatar = currentUser ? getAvatarUrl(currentUser.name, 24) : '';
                const placeholder = replyToName ? `Reply to ${replyToName}...` : 'Add a reply...';
                
                replyContainer.innerHTML = `
                    <div class="reply-avatar-small">
                        ${currentUser ? `<img src="${avatar}" alt="" style="width:100%;height:100%;border-radius:50%;">` : 'U'}
                    </div>
                    <div style="flex:1;">
                        <textarea class="comment-input" id="replyText-${inputId}" placeholder="${placeholder}" rows="1" style="font-size:14px;"></textarea>
                        <div class="reply-input-actions">
                            <button class="comment-btn comment-btn-cancel" onclick="cancelReply('${inputId}')">Cancel</button>
                            <button class="comment-btn comment-btn-submit" onclick="postReply('${commentId}', '${parentReplyId || ''}')" disabled>Reply</button>
                        </div>
                    </div>
                `;
                
                replyContainer.classList.add('active');
                activeReplyInput = inputId;
                
                setTimeout(() => {
                    const textarea = document.getElementById(`replyText-${inputId}`);
                    const submitBtn = replyContainer.querySelector('.comment-btn-submit');
                    if (textarea) {
                        textarea.focus();
                        textarea.addEventListener('input', (e) => {
                            submitBtn.disabled = e.target.value.trim() === '';
                        });
                    }
                }, 100);
            }
        }
        
        function cancelReply(inputId) {
            const container = document.getElementById(inputId);
            if (container) {
                container.classList.remove('active');
                container.innerHTML = '';
            }
            activeReplyInput = null;
        }
        
        function postReply(commentId, parentReplyId) {
            if (!currentUser) return;
            
            if (parentReplyId === '' || parentReplyId === 'null') {
                parentReplyId = null;
            }
            
            const inputId = parentReplyId ? `replyInput-${commentId}-${parentReplyId}` : `replyInput-${commentId}`;
            const textEl = document.getElementById(`replyText-${inputId}`);
            
            if (!textEl) {
                console.error('Reply input not found:', inputId);
                return;
            }
            
            const text = textEl.value.trim();
            if (!text) return;
            
            const replyData = {
                userId: currentUser.id,
                userName: currentUser.name || 'Anonymous',
                text: text,
                timestamp: Date.now(),
                likes: {},
                parentReplyId: parentReplyId || null
            };
            
            const replyRef = database.ref(`comments/${appId}/${commentId}/replies`).push();
            replyRef.set(replyData).then(() => {
                cancelReply(inputId);
                showToast('Reply posted!');
                
                const repliesList = document.getElementById(`repliesList-${commentId}`);
                const viewBtn = document.getElementById(`viewRepliesBtn-${commentId}`);
                if (repliesList && !repliesList.classList.contains('active')) {
                    toggleReplies(commentId);
                }
            }).catch(err => {
                console.error('Reply failed:', err);
                showToast('Failed to post reply');
            });
        }
        
        function toggleReplies(commentId) {
            const repliesList = document.getElementById(`repliesList-${commentId}`);
            const viewBtn = document.getElementById(`viewRepliesBtn-${commentId}`);
            
            if (repliesList && viewBtn) {
                if (repliesList.classList.contains('active')) {
                    repliesList.classList.remove('active');
                    viewBtn.classList.remove('expanded');
                    const count = viewBtn.querySelector('span').textContent.split(' ')[0];
                    viewBtn.innerHTML = `<span class="material-icons">expand_more</span><span>${count} replies</span>`;
                } else {
                    repliesList.classList.add('active');
                    viewBtn.classList.add('expanded');
                    const count = viewBtn.querySelector('span').textContent.split(' ')[0];
                    viewBtn.innerHTML = `<span class="material-icons">expand_less</span><span>Hide replies</span>`;
                }
            }
        }
        
        function loadComments() {
            database.ref(`comments/${appId}`).orderByChild('timestamp').on('value', snapshot => {
                const comments = snapshot.val();
                const container = document.getElementById('commentsList');
                const countElement = document.getElementById('commentsCount');
                
                if (!comments) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <span class="material-icons">chat_bubble_outline</span>
                            <h3>No comments yet</h3>
                            <p>Be the first to share your thoughts!</p>
                        </div>
                    `;
                    if (countElement) countElement.textContent = '0 Comments';
                    return;
                }
                
                const commentsArray = Object.entries(comments)
                    .map(([id, c]) => ({ id, ...c }))
                    .sort((a, b) => b.timestamp - a.timestamp);
                
                const totalCount = commentsArray.reduce((acc, c) => {
                    return acc + 1 + (c.replies ? Object.keys(c.replies).length : 0);
                }, 0);
                
                if (countElement) {
                    countElement.textContent = `${totalCount} Comments`;
                }
                
                container.innerHTML = commentsArray.map(comment => renderCommentThread(comment)).join('');
            });
        }
        
        function renderCommentThread(comment) {
            const replies = comment.replies || {};
            const repliesArray = Object.entries(replies)
                .map(([id, r]) => ({ id, ...r }))
                .sort((a, b) => a.timestamp - b.timestamp);
            
            // Flatten replies - sabko ek list mein dikhana hai
            const allReplies = flattenReplies(repliesArray);
            
            const replyCount = repliesArray.length;
            const hasReplies = replyCount > 0;
            const isOwner = currentUser && currentUser.id === comment.userId;
            const likeCount = comment.likes ? Object.keys(comment.likes).length : 0;
            const isLiked = currentUser && comment.likes && comment.likes[currentUser.id];
            
            let repliesHtml = '';
            if (hasReplies) {
                repliesHtml = `
                    <div class="replies-container">
                        <button class="view-replies-btn" id="viewRepliesBtn-${comment.id}" onclick="toggleReplies('${comment.id}')">
                            <span class="material-icons">expand_more</span>
                            <span>${replyCount} replies</span>
                        </button>
                        <div class="replies-list" id="repliesList-${comment.id}">
                            ${allReplies.map(reply => renderReplyItem(reply, comment.id)).join('')}
                        </div>
                    </div>
                `;
            }
            
            return `
                <div class="comment-thread" id="comment-${comment.id}">
                    <div class="comment-avatar">
                        <img src="${getAvatarUrl(comment.userName)}" alt="${comment.userName || 'User'}" onerror="this.src='https://ui-avatars.com/api/?name=User&background=random&color=fff&size=40'">
                    </div>
                    <div class="comment-body">
                        <div class="comment-header">
                            <span class="comment-author">${comment.userName || 'Anonymous'}</span>
                            <span class="comment-time">• ${formatDate(comment.timestamp)}</span>
                        </div>
                        <div class="comment-text">${escapeHtml(comment.text)}</div>
                        <div class="comment-actions-bar">
                            <button class="action-btn ${isLiked ? 'liked' : ''}" onclick="likeComment('${comment.id}')">
                                <span class="material-icons">${isLiked ? 'thumb_up' : 'thumb_up_off_alt'}</span>
                                ${likeCount > 0 ? `<span>${likeCount}</span>` : ''}
                            </button>
                            <button class="action-btn" onclick="toggleReplyInput('${comment.id}')">
                                <span class="material-icons">comment</span>
                            </button>
                            ${isOwner ? `
                                <button class="action-btn" onclick="deleteComment('${comment.id}')" style="color:#ff0000;">
                                    <span class="material-icons">delete</span>
                                </button>
                            ` : ''}
                        </div>
                        ${repliesHtml}
                    </div>
                </div>
            `;
        }
        
        // Replies ko flat list mein convert karna (nested nahi, line by line)
        function flattenReplies(repliesArray, level = 0, result = []) {
            repliesArray.forEach(reply => {
                result.push({ ...reply, level });
                if (reply.replies) {
                    const nested = Object.entries(reply.replies).map(([id, r]) => ({ id, ...r }));
                    flattenReplies(nested, level + 1, result);
                }
            });
            return result;
        }
        
        function renderReplyItem(reply, commentId) {
            const isOwner = currentUser && currentUser.id === reply.userId;
            const likeCount = reply.likes ? Object.keys(reply.likes).length : 0;
            const isLiked = currentUser && reply.likes && reply.likes[currentUser.id];
            const replyToName = reply.parentReplyName || '';
            
            return `
                <div class="reply-item" id="reply-${reply.id}">
                    <div class="reply-avatar">
                        <img src="${getAvatarUrl(reply.userName || 'User', 32)}" alt="" style="width:100%;height:100%;object-fit:cover;" onerror="this.src='https://ui-avatars.com/api/?name=U&background=random&color=fff&size=32'">
                    </div>
                    <div class="reply-body">
                        <div class="reply-header">
                            <span class="reply-author">${reply.userName || 'Anonymous'}</span>
                            ${replyToName ? `<span style="color:var(--text-secondary);font-size:13px;"> @${replyToName}</span>` : ''}
                            <span class="reply-time">• ${formatDate(reply.timestamp)}</span>
                        </div>
                        <div class="reply-text">${escapeHtml(reply.text)}</div>
                        <div class="comment-actions-bar">
                            <button class="action-btn ${isLiked ? 'liked' : ''}" onclick="likeReply('${commentId}', '${reply.id}')">
                                <span class="material-icons">${isLiked ? 'thumb_up' : 'thumb_up_off_alt'}</span>
                                ${likeCount > 0 ? `<span>${likeCount}</span>` : ''}
                            </button>
                            <button class="action-btn" onclick="toggleReplyInput('${commentId}', '${reply.id}', '${reply.userName || 'User'}')">
                                <span class="material-icons">comment</span>
                            </button>
                            ${isOwner ? `
                                <button class="action-btn" onclick="deleteReply('${commentId}', '${reply.id}')" style="color:#ff0000;">
                                    <span class="material-icons">delete</span>
                                </button>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function likeComment(commentId) {
            if (!currentUser) {
                showToast('Please login to like');
                return;
            }
            
            const likeRef = database.ref(`comments/${appId}/${commentId}/likes/${currentUser.id}`);
            likeRef.once('value').then(snapshot => {
                if (snapshot.val()) {
                    likeRef.remove();
                } else {
                    likeRef.set(true);
                }
            });
        }
        
        function likeReply(commentId, replyId) {
            if (!currentUser) {
                showToast('Please login to like');
                return;
            }
            
            const likeRef = database.ref(`comments/${appId}/${commentId}/replies/${replyId}/likes/${currentUser.id}`);
            likeRef.once('value').then(snapshot => {
                if (snapshot.val()) {
                    likeRef.remove();
                } else {
                    likeRef.set(true);
                }
            });
        }
        
        function deleteComment(commentId) {
            if (!confirm('Delete this comment?')) return;
            database.ref(`comments/${appId}/${commentId}`).remove();
            showToast('Comment deleted');
        }
        
        function deleteReply(commentId, replyId) {
            if (!confirm('Delete this reply?')) return;
            database.ref(`comments/${appId}/${commentId}/replies/${replyId}`).remove();
            showToast('Reply deleted');

        function shareApp() {
            if (navigator.share) {
                navigator.share({
                    title: appData?.name || 'Check out this app',
                    text: `Download ${appData?.name} from MEGA STORE`,
                    url: window.location.href
                });

                navigator.clipboard.writeText(window.location.href);
                showToast('Link copied to clipboard');

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num || 0;
        }
        
        function formatDate(timestamp) {
            if (!timestamp || isNaN(timestamp)) {
                return 'just now';
            }
            
            if (typeof timestamp === 'string') {
                timestamp = new Date(timestamp).getTime();
            }
            
            const date = new Date(timestamp);
            const now = new Date();
            const diffTime = Math.abs(now - date);
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            
            if (diffDays === 0) {
                const diffHours = Math.floor(diffTime / (1000 * 60 * 60));
                if (diffHours === 0) {
                    const diffMinutes = Math.floor(diffTime / (1000 * 60));
                    if (diffMinutes === 0) return 'just now';
                    return `${diffMinutes}m ago`;
                }
                return `${diffHours}h ago`;
            } else if (diffDays === 1) {
                return '1 day ago';
            } else if (diffDays < 7) {
                return `${diffDays} days ago`;
            } else if (diffDays < 30) {
                return `${Math.floor(diffDays / 7)}w ago`;
            } else if (diffDays < 365) {
                return `${Math.floor(diffDays / 30)}mo ago`;
            } else {
                return `${Math.floor(diffDays / 365)}y ago`;
            }
        }
        
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

            if (!isAppOwner) {
                showToast('You can only edit your own apps');
                return;
            }
            
            // Reset uploaded images
            editUploadedIconUrl = '';
            editUploadedScreenshots = {};
            
            // Pre-fill form with current data
            document.getElementById('editAppName').value = appData.name || '';
            document.getElementById('editDeveloperName').value = appData.developer || '';
            document.getElementById('editDownloadUrl').value = appData.downloadUrl || '';

                        <button type="button" class="remove-image" onclick="removeEditScreenshot(event, ${i})">
                            <span class="material-icons">close</span>
                        </button>
                    `;
                    uploadBox.classList.add('has-image');
                } else {
                    uploadBox.innerHTML = `
                        <span class="screenshot-number">${i}</span>
                        <input type="file" accept="image/*" onchange="handleEditScreenshotUpload(this, ${i})">
                        <span class="material-icons upload-icon">add_photo_alternate</span>
                    `;
                    uploadBox.classList.remove('has-image');

            document.getElementById('editModal').classList.add('active');

        function closeEditModal(event) {
            if (!event || event.target === document.getElementById('editModal')) {
                document.getElementById('editModal').classList.remove('active');
                document.body.style.overflow = '';
            }
        }
        
        function handleEdit(event) {
            event.preventDefault();
            
            if (!isAppOwner) {
                showToast('Unauthorized');
                return;
            }
            
            // Check if icon is uploaded
            if (!editUploadedIconUrl) {
                showToast('Please upload an app icon');
                return;
            }
            
            const submitBtn = document.getElementById('editSubmitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="material-icons">hourglass_top</span> Saving...';
            
            // Get all uploaded screenshot URLs in order
            const screenshots = [];
            for (let i = 1; i <= 6; i++) {
                if (editUploadedScreenshots[i]) {
                    screenshots.push(editUploadedScreenshots[i]);
                }
            }
            console.log('Edit - Screenshots to save:', screenshots);
            
            const updatedData = {
                name: document.getElementById('editAppName').value.trim(),
                developer: document.getElementById('editDeveloperName').value.trim(),
                icon: editUploadedIconUrl,
                downloadUrl: document.getElementById('editDownloadUrl').value.trim(),
                size: document.getElementById('editFileSize').value.trim(),
                screenshots: screenshots,
                description: document.getElementById('editDescription').value.trim(),
                updatedAt: new Date().toISOString()
            };
            
            // Update in Firebase
            database.ref(`apps/${appId}`).update(updatedData)
                .then(() => {
                    showToast('App updated successfully!');
                    closeEditModal();
                    
                    // Update local data and re-render
                    appData = { ...appData, ...updatedData };
                    screenshots = screenshots;
                    renderAppDetails();
                })
                .catch((error) => {
                    console.error('Update error:', error);
                    showToast('Failed to update app');
                })
                .finally(() => {
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = '<span class="material-icons">save</span> Save Changes';
                });
        }
        
        // Close modal on escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeEditModal();
                closeLightbox();
            }
        });
    </script>
