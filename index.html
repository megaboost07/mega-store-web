<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MEGA STORE </title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link rel="icon" href="https://i.supaimg.com/b2b073ad-af1b-43d5-893f-f82f74e90511.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #1a73e8;
            --primary-dark: #1557b0;
            --secondary: #00c853;
            --background: #f8f9fa;
            --surface: #ffffff;
            --text-primary: #202124;
            --text-secondary: #5f6368;
            --divider: #dadce0;
            --shadow-1: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15);
            --shadow-2: 0 1px 2px 0 rgba(60,64,67,0.3), 0 2px 6px 2px rgba(60,64,67,0.15);
            --shadow-3: 0 1px 3px 0 rgba(60,64,67,0.3), 0 4px 8px 3px rgba(60,64,67,0.15);
        }
        
         [data-theme="dark"] {
            --background: #0B121E;
            --surface: #121A2A;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --divider: #333333;
        }
        
        body {
            font-family: 'Roboto', sans-serif;
            background: var(--background);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* Landing Page Styles */
        .landing-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #1a73e8 0%, #4285f4 50%, #34a853 100%);
            position: relative;
            overflow: hidden;
        }
        
        .landing-container::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: pulse 4s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }
        
        .landing-header {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo-icon {
            width: 48px;
            height: 48px;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-2);
        }
        
        .logo-icon .material-icons {
            font-size: 32px;
            color: var(--primary);
        }
        
        .logo-text {
            font-size: 24px;
            font-weight: 700;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        
        .admin-btn {
            padding: 10px 20px;
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 24px;
            color: white;
            text-decoration: none;
            font-weight: 500;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        
        .admin-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }
        
        .landing-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
            z-index: 10;
        }
        
        .landing-title {
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 700;
            color: white;
            margin-bottom: 16px;
            text-shadow: 0 4px 8px rgba(0,0,0,0.2);
            animation: fadeInUp 0.8s ease;
        }
        
        .landing-subtitle {
            font-size: clamp(1rem, 3vw, 1.5rem);
            color: rgba(255,255,255,0.9);
            margin-bottom: 40px;
            max-width: 600px;
            animation: fadeInUp 0.8s ease 0.2s both;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .feature-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            max-width: 800px;
            width: 100%;
            margin-bottom: 40px;
            animation: fadeInUp 0.8s ease 0.4s both;
        }
        
        .feature-card {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s ease;
        }
        
        .feature-card:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.25);
        }
        
        .feature-card .material-icons {
            font-size: 40px;
            color: white;
            margin-bottom: 12px;
        }
        
        .feature-card h3 {
            color: white;
            font-size: 14px;
            font-weight: 500;
        }
        
        .cta-button {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 18px 48px;
            background: white;
            color: var(--primary);
            border: none;
            border-radius: 32px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: var(--shadow-3);
            transition: all 0.3s ease;
            text-decoration: none;
            animation: fadeInUp 0.8s ease 0.6s both;
        }
        
        .cta-button:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }
        
        .cta-button .material-icons {
            font-size: 24px;
        }
        
        .landing-footer {
            padding: 20px;
            text-align: center;
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            z-index: 10;
        }
        
        .floating-apps {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
        }
        
        .floating-app {
            position: absolute;
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            backdrop-filter: blur(5px);
            animation: float 6s ease-in-out infinite;
        }
        
        .floating-app:nth-child(1) { top: 10%; left: 10%; animation-delay: 0s; }
        .floating-app:nth-child(2) { top: 20%; right: 15%; animation-delay: 1s; }
        .floating-app:nth-child(3) { top: 60%; left: 5%; animation-delay: 2s; }
        .floating-app:nth-child(4) { bottom: 20%; right: 10%; animation-delay: 3s; }
        .floating-app:nth-child(5) { top: 40%; right: 25%; animation-delay: 4s; }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }
        
        /* Ripple Effect */
        .ripple {
            position: relative;
            overflow: hidden;
        }
        
        .ripple::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }
        
        .ripple:active::after {
            width: 300px;
            height: 300px;
        }
    </style>
</head>
<body>
    <div class="landing-container">
        <div class="floating-apps">
            <div class="floating-app"></div>
            <div class="floating-app"></div>
            <div class="floating-app"></div>
            <div class="floating-app"></div>
            <div class="floating-app"></div>
        </div>
        
        <header class="landing-header">
            <div class="logo">
                <div class="logo-icon">
                   <img src="https://i.supaimg.com/b2b073ad-af1b-43d5-893f-f82f74e90511.png" 
     alt="Logo" 
     class="icon-img"
     style="height:40px; width:40px;">
                </div>
                <span class="logo-text">mega-store.in</span>
            </div>
           
        </header>
        
        <main class="landing-content">
            <h1 class="landing-title">sketchware project  store </h1>
            <p class="landing-subtitle"></p>
            
            <div class="feature-grid">
                <div class="feature-card">
                    <span class="material-icons">download</span>
                    <h3>Fast Downloads</h3>
                </div>
                <div class="feature-card">
                    <span class="material-icons">security</span>
                    <h3>100% Secure</h3>
                </div>
                <div class="feature-card">
                    <span class="material-icons">star</span>
                    <h3>Premium Quality</h3>
                </div>
                <div class="feature-card">
                    <span class="material-icons">update</span>
                    <h3>Daily Updates</h3>
                </div>
            </div>
            
            <a href="home.html" class="cta-button ripple">
                <span class="material-icons">rocket_launch</span>
                Enter Store
            </a>
        </main>
        
        <footer class="landing-footer">
            <p>copyright 2026 & mega- store </p>
        </footer>
    </div>
    
    <script>
        // Firebase Configuration
        const firebaseConfig = {
           apiKey: "AIzaSyBQnUabSu6WGbq1te-hBEAYPZdOO93_Mfk",
           authDomain: "mega-store-2025.firebaseapp.com",
           databaseURL: "https://mega-store-2025-default-rtdb.firebaseio.com",
           projectId: "mega-store-2025",
           storageBucket: "mega-store-2025.firebasestorage.app",
           messagingSenderId: "190838364165",
           appId: "1:190838364165:web:43a969b7b852777061e46c",
           measurementId: "G-CZR2N1HF9K"
           };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        // Check for saved theme
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        
        // Ripple effect for buttons
        document.querySelectorAll('.ripple').forEach(button => {
            button.addEventListener('click', function(e) {
                const ripple = document.createElement('span');
                const rect = this.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                const x = e.clientX - rect.left - size / 2;
                const y = e.clientY - rect.top - size / 2;
                
                ripple.style.cssText = `
                    position: absolute;
                    width: ${size}px;
                    height: ${size}px;
                    left: ${x}px;
                    top: ${y}px;
                    background: rgba(255,255,255,0.3);
                    border-radius: 50%;
                    transform: scale(0);
                    animation: ripple 0.6s ease-out;
                    pointer-events: none;
                `;
                
                this.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            });
        });
        
        // Add ripple animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes ripple {
                to {
                    transform: scale(2);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
