        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #1a73e8;
            --primary-dark: #1557b0;
            --secondary: #00c853;
            --background: #f8f9fa;
            --surface: #ffffff;
            --text-primary: #202124;
            --text-secondary: #5f6368;
            --divider: #dadce0;
            --shadow-1: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15);
            --shadow-2: 0 1px 2px 0 rgba(60,64,67,0.3), 0 2px 6px 2px rgba(60,64,67,0.15);
        }
        
        [data-theme="dark"] {
            --background: #0B121E;
            --surface: #121A2A;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --divider: #333333;
        }
        
        body {
            font-family: 'Roboto', sans-serif;
            background: var(--background);
            color: var(--text-primary);
            min-height: 100vh;
            padding-bottom: 80px;
        }
        
        /* App Bar */
        .app-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: var(--surface);
            display: flex;
            align-items: center;
            padding: 0 16px;
            box-shadow: var(--shadow-1);
            z-index: 100;
        }
        
        .back-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: transparent;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .back-btn .material-icons {
            font-size: 24px;
            color: var(--text-primary);
        }
        
        .app-title {
            flex: 1;
            font-size: 20px;
            font-weight: 600;
            margin-left: 16px;
        }
        
        /* Main Content */
        .main-content {
            margin-top: 64px;
            padding: 16px;
        }
        
        /* Profile Header */
        .profile-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-radius: 16px;
            padding: 32px 24px;
            text-align: center;
            color: white;
            margin-bottom: 24px;
        }
        
        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: white;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: var(--shadow-2);
        }
        
        .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .profile-avatar .material-icons {
            font-size: 60px;
            color: var(--primary);
        }
        
        .profile-name {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .profile-email {
            font-size: 14px;
            opacity: 0.9;
        }
        
        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }
        
        .stat-card {
            background: var(--surface);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            box-shadow: var(--shadow-1);
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 4px;
        }
        
        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        /* Menu Section */
        .menu-section {
            background: var(--surface);
            border-radius: 12px;
            box-shadow: var(--shadow-1);
            overflow: hidden;
            margin-bottom: 16px;
        }
        
        .menu-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px;
            color: var(--text-primary);
            text-decoration: none;
            transition: background 0.2s;
            cursor: pointer;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            font-size: 16px;
        }
        
        .menu-item:hover {
            background: rgba(0,0,0,0.05);
        }
        
        .menu-item:not(:last-child) {
            border-bottom: 1px solid var(--divider);
        }
        
        .menu-item .material-icons {
            font-size: 24px;
            color: var(--text-secondary);
        }
        
        .menu-item span:last-child {
            flex: 1;
        }
        
        .menu-item .arrow {
            color: var(--text-secondary);
        }
        
        /* Login Prompt */

            text-align: center;
            box-shadow: var(--shadow-1);

            font-weight: 600;

        .login-prompt p {
            color: var(--text-secondary);
            margin-bottom: 24px;
        }
        
        .login-btn {

            gap: 8px;

            text-decoration: none;

        .login-btn:hover {

        }
        
        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: var(--surface);
            box-shadow: 0 -1px 2px rgba(0,0,0,0.1);

            z-index: 100;

        .nav-item {

            align-items: center;

            color: var(--text-secondary);
            text-decoration: none;

        }
        
        .nav-item.active {

        }
        
        .nav-item .material-icons {
            font-size: 24px;
        }
        
        .nav-item span:last-child {

        /* Toast */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;

            background: #323232;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 300;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

    <script>
        // Clean URL Handler - Remove .html from URLs in address bar
        (function() {
            // Handle initial page load - remove .html from URL
            let path = window.location.pathname;
            if (path.endsWith('.html')) {
                let cleanPath = path.replace('.html', '');
                window.history.replaceState({}, '', cleanPath + window.location.search + window.location.hash);
            }

            // Intercept all link clicks
            document.addEventListener('click', function(e) {
                let link = e.target.closest('a');
                if (!link) return;

                let href = link.getAttribute('href');
                if (!href || href.startsWith('http') || href.startsWith('#') || href.startsWith('javascript') || href.startsWith('/')) {
                    return; // External links, anchors, javascript, or absolute paths - let them work normally
                }

                // If href doesn't have .html and is not empty, add .html for navigation
                if (href && !href.endsWith('.html') && !href.includes('.') && href !== '/') {
                    e.preventDefault();
                    let actualFile = href + '.html';
                    window.history.pushState({}, '', href + window.location.search);
                    window.location.href = actualFile;
                }
            });

            // Handle browser back/forward buttons
            window.addEventListener('popstate', function(e) {
                let path = window.location.pathname;
                if (!path.endsWith('.html') && path !== '/' && path !== '') {
                    let actualFile = path + '.html';
                    window.location.href = actualFile;
                }
            });
        })();
    </script>
