<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - MEGA STORE</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="https://i.supaimg.com/b2b073ad-af1b-43d5-893f-f82f74e90511.png">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <a href="home.html" class="logo">
            <img src="https://i.supaimg.com/b2b073ad-af1b-43d5-893f-f82f74e90511.png" alt="MEGA STORE">
            <span>MEGA STORE</span>
        </a>
        <div class="header-actions">
            <a href="search.html" class="icon-btn">
                <i class="fas fa-search"></i>
            </a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Profile Header -->
        <div class="profile-header" id="profileHeader">
            <div class="profile-avatar">
                <img src="" alt="Profile" id="profileAvatar">
            </div>
            <h2 class="profile-name" id="profileName">Loading...</h2>
            <p class="profile-email" id="profileEmail">...</p>
        </div>

        <!-- Profile Menu -->
        <div class="profile-menu">
            <a href="#" class="profile-item" onclick="openEditProfile()">
                <i class="fas fa-edit"></i>
                <span>Edit Profile</span>
                <i class="fas fa-chevron-right" style="color: var(--text-secondary);"></i>
            </a>
            <div class="profile-item">
                <i class="fas fa-moon"></i>
                <span>Dark Mode</span>
                <label class="toggle-switch">
                    <input type="checkbox" id="darkModeToggle" onchange="toggleDarkMode()">
                    <span class="toggle-slider"></span>
                </label>
            </div>
            <a href="about.html" class="profile-item">
                <i class="fas fa-info-circle"></i>
                <span>About Us</span>
                <i class="fas fa-chevron-right" style="color: var(--text-secondary);"></i>
            </a>
            <a href="contact.html" class="profile-item">
                <i class="fas fa-envelope"></i>
                <span>Contact Us</span>
                <i class="fas fa-chevron-right" style="color: var(--text-secondary);"></i>
            </a>
            <a href="privacy.html" class="profile-item">
                <i class="fas fa-shield-alt"></i>
                <span>Privacy Policy</span>
                <i class="fas fa-chevron-right" style="color: var(--text-secondary);"></i>
            </a>
            <a href="disclaimer.html" class="profile-item">
                <i class="fas fa-file-alt"></i>
                <span>Disclaimer</span>
                <i class="fas fa-chevron-right" style="color: var(--text-secondary);"></i>
            </a>
            <a href="#" class="profile-item" onclick="logout()" style="color: #ef4444;">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout</span>
                <i class="fas fa-chevron-right" style="color: #ef4444;"></i>
            </a>
        </div>
    </main>

    <!-- Edit Profile Modal -->
    <div id="editModal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 2000; align-items: center; justify-content: center;">
        <div style="background: var(--surface); border-radius: var(--radius); padding: 30px; width: 90%; max-width: 400px; border: 1px solid var(--border);">
            <h3 style="margin-bottom: 20px; color: var(--text-primary);">Edit Profile</h3>
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" class="form-input" id="editUsername">
            </div>
            <div class="form-group">
                <label class="form-label">Profile Image URL</label>
                <input type="url" class="form-input" id="editAvatar" placeholder="https://...">
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-primary" onclick="saveProfile()" style="flex: 1;">Save</button>
                <button class="btn btn-secondary" onclick="closeEditModal()" style="flex: 1;">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <a href="home.html" class="nav-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="allapp.html" class="nav-item">
            <i class="fas fa-th-large"></i>
            <span>Apps</span>
        </a>
        <a href="news.html" class="nav-item">
            <i class="fas fa-newspaper"></i>
            <span>News</span>
        </a>
        <a href="profile.html" class="nav-item active">
            <i class="fas fa-user"></i>
            <span>Profile</span>
        </a>
    </nav>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-storage-compat.js"></script>
    <script src="../firebase-config.js"></script>
    <script src="js/main.js"></script>
    <script>
        let currentUser = null;

        document.addEventListener('DOMContentLoaded', function() {
            // Check login
            const userData = localStorage.getItem('currentUser');
            if (!userData) {
                window.location.href = 'login-account.html?redirect=' + encodeURIComponent(window.location.href);
                return;
            }

            currentUser = JSON.parse(userData);
            loadProfile();

            // Check dark mode - properly initialize
            const savedTheme = localStorage.getItem('theme');
            const isDark = savedTheme === 'dark' || savedTheme === null; // Default to dark
            document.getElementById('darkModeToggle').checked = isDark;
            if (isDark) {
                document.documentElement.removeAttribute('data-theme');
            } else {
                document.documentElement.setAttribute('data-theme', 'light');
            }
        });

        function loadProfile() {
            document.getElementById('profileName').textContent = currentUser.username;
            document.getElementById('profileEmail').textContent = currentUser.email;
            document.getElementById('profileAvatar').src = currentUser.avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(currentUser.username)}&background=random`;
        }

        function openEditProfile() {
            document.getElementById('editUsername').value = currentUser.username;
            document.getElementById('editAvatar').value = currentUser.avatar || '';
            document.getElementById('editModal').style.display = 'flex';
        }

        function closeEditModal() {
            document.getElementById('editModal').style.display = 'none';
        }

        function saveProfile() {
            const newUsername = document.getElementById('editUsername').value.trim();
            const newAvatar = document.getElementById('editAvatar').value.trim();

            if (!newUsername) {
                showToast('Username is required!', 'error');
                return;
            }

            // Update current user
            currentUser.username = newUsername;
            if (newAvatar) {
                currentUser.avatar = newAvatar;
            }

            // Update localStorage
            localStorage.setItem('currentUser', JSON.stringify(currentUser));

            // Update users list
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const userIndex = users.findIndex(u => u.id === currentUser.id);
            if (userIndex !== -1) {
                users[userIndex] = currentUser;
                localStorage.setItem('users', JSON.stringify(users));
            }

            loadProfile();
            closeEditModal();
            showToast('Profile updated successfully!');
        }

        function toggleDarkMode() {
            const isDark = document.getElementById('darkModeToggle').checked;
            
            if (isDark) {
                // Dark mode
                localStorage.setItem('theme', 'dark');
                document.documentElement.removeAttribute('data-theme');
            } else {
                // Light mode
                localStorage.setItem('theme', 'light');
                document.documentElement.setAttribute('data-theme', 'light');
            }
        }

        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('currentUser');
                showToast('Logged out successfully!');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1500);
            }
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
