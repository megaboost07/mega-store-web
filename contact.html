<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Contact Us - MEGA STORE</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="icon" href="https://i.supaimg.com/b2b073ad-af1b-43d5-893f-f82f74e90511.png">
    <!-- Firebase SDK v9+ (Modular) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push, set, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBQnUabSu6WGbq1te-hBEAYPZdOO93_Mfk",
            authDomain: "mega-store-2025.firebaseapp.com",
            databaseURL: "https://mega-store-2025-default-rtdb.firebaseio.com",
            projectId: "mega-store-2025",
            storageBucket: "mega-store-2025.firebasestorage.app",
            messagingSenderId: "190838364165",
            appId: "1:190838364165:web:43a969b7b852777061e46c",
            measurementId: "G-CZR2N1HF9K"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // Make Firebase functions globally available
        window.firebaseDB = {
            database,
            ref,
            push,
            set,
            serverTimestamp
        };
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #1a73e8;
            --primary-dark: #1557b0;
            --background: #f8f9fa;
            --surface: #ffffff;
            --text-primary: #202124;
            --text-secondary: #5f6368;
            --divider: #dadce0;
            --shadow-1: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15);
        }
        
        [data-theme="dark"] {
            --background: #0B121E;
            --surface: #121A2A;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --divider: #333333;
        }
        
        body {
            font-family: 'Roboto', sans-serif;
            background: var(--background);
            color: var(--text-primary);
            min-height: 100vh;
        }
        
        .app-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: var(--surface);
            display: flex;
            align-items: center;
            padding: 0 16px;
            box-shadow: var(--shadow-1);
            z-index: 100;
        }
        
        .back-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: transparent;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .back-btn .material-icons {
            font-size: 24px;
            color: var(--text-primary);
        }
        
        .app-title {
            flex: 1;
            font-size: 20px;
            font-weight: 600;
            margin-left: 16px;
        }
        
        .main-content {
            margin-top: 64px;
            padding: 24px;
        }
        
        .contact-card {
            background: var(--surface);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
            box-shadow: var(--shadow-1);
        }
        
        .contact-card h2 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .contact-card h2 .material-icons {
            color: var(--primary);
        }
        
        .contact-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 0;
            border-bottom: 1px solid var(--divider);
        }
        
        .contact-item:last-child {
            border-bottom: none;
        }
        
        .contact-icon {
            width: 48px;
            height: 48px;
            background: var(--background);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .contact-icon .material-icons {
            color: var(--primary);
        }
        
        .contact-info h3 {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 4px;
        }
        
        .contact-info p {
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }
        
        .form-input, .form-textarea {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--divider);
            border-radius: 12px;
            font-size: 16px;
            background: var(--background);
            color: var(--text-primary);
            font-family: inherit;
        }
        
        .form-textarea {
            min-height: 120px;
            resize: vertical;
        }
        
        .form-input:focus, .form-textarea:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .submit-btn:hover {
            background: var(--primary-dark);
        }
        
        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #323232;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 300;
        }
        
        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body>
    <header class="app-bar">
        <button class="back-btn" onclick="history.back()">
            <span class="material-icons">arrow_back</span>
        </button>
        <h1 class="app-title">Contact Us</h1>
    </header>
    
    <main class="main-content">
        <div class="contact-card">
            <h2><span class="material-icons">contact_mail</span> Get in Touch</h2>
            <div class="contact-item">
                <div class="contact-icon">
                    <span class="material-icons">email</span>
                </div>
                <div class="contact-info">
                    <h3>Email</h3>
                    <p>usamega125@gmail.com</p>
                </div>
            </div>
            <div class="contact-item">
                <div class="contact-icon">
                    <span class="material-icons">phone</span>
                </div>
                <div class="contact-info">
                    <h3>Phone</h3>
                    <p>+91 8134958144</p>
                </div>
            </div>
            <div class="contact-item">
                <div class="contact-icon">
                    <span class="material-icons">location_on</span>
                </div>
                <div class="contact-info">
                    <h3>Address</h3>
                    <p>house number 185 , Assam , Silchar , india </p>
                </div>
            </div>
        </div>
        
        <div class="contact-card">
            <h2><span class="material-icons">edit</span> Send Message</h2>
            <form onsubmit="sendMessage(event)">
                <div class="form-group">
                    <label class="form-label">Your Name</label>
                    <input type="text" class="form-input" id="name" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Your Email</label>
                    <input type="email" class="form-input" id="email" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Message</label>
                    <textarea class="form-textarea" id="message" required></textarea>
                </div>
                <button type="submit" class="submit-btn" id="submitBtn">
                    <span class="material-icons">send</span>
                    Send Message
                </button>
            </form>
        </div>
    </main>
    
    <div class="toast" id="toast"></div>
    
    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        
        async function sendMessage(e) {
            e.preventDefault();
            
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const message = document.getElementById('message').value;
            const submitBtn = document.getElementById('submitBtn');
            
            // Disable button while sending
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="material-icons">hourglass_empty</span> Sending...';
            
            try {
                // Firebase Realtime Database mein message save karo
                const { database, ref, push, set, serverTimestamp } = window.firebaseDB;
                
                // 'messages' node mein naya message push karo
                const messagesRef = ref(database, 'messages');
                const newMessageRef = push(messagesRef);
                
                await set(newMessageRef, {
                    name: name,
                    email: email,
                    message: message,
                    timestamp: serverTimestamp(),
                    status: 'unread'
                });
                
                // Form clear karo
                document.getElementById('name').value = '';
                document.getElementById('email').value = '';
                document.getElementById('message').value = '';
                
                showToast('Message sent successfully!');
                
            } catch (error) {
                console.error('Error sending message:', error);
                showToast('Error sending message. Please try again.');
            } finally {
                // Button wapas enable karo
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<span class="material-icons">send</span> Send Message';
            }
        }
        
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>
