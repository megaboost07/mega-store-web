    <script>
        // Firebase Configuration
        const firebaseConfig = {
           apiKey: "AIzaSyBQnUabSu6WGbq1te-hBEAYPZdOO93_Mfk",
           authDomain: "mega-store-2025.firebaseapp.com",

           projectId: "mega-store-2025",
           storageBucket: "mega-store-2025.firebasestorage.app",
           messagingSenderId: "190838364165",
           appId: "1:190838364165:web:43a969b7b852777061e46c",
           measurementId: "G-CZR2N1HF9K"
           };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // State
        let allApps = [];
        let showScreenshots = {};
        let searchHistory = [];
        let currentSuggestions = [];
        const MAX_HISTORY_ITEMS = 15;
        const MAX_SUGGESTIONS = 8;

        // Check theme
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);

        // Load search history from localStorage
        function loadSearchHistory() {
            const stored = localStorage.getItem('megaStoreSearchHistory');
            if (stored) {
                searchHistory = JSON.parse(stored);
            }
            renderSearchHistory();
        }

        // Save search history to localStorage
        function saveSearchHistory() {
            localStorage.setItem('megaStoreSearchHistory', JSON.stringify(searchHistory));
        }

        // Add search term to history
        function addToHistory(searchTerm) {
            if (!searchTerm || searchTerm.trim() === '') return;

            searchTerm = searchTerm.trim();

            // Remove if already exists (to move to top)
            searchHistory = searchHistory.filter(item => item.toLowerCase() !== searchTerm.toLowerCase());

            // Add to beginning
            searchHistory.unshift(searchTerm);

            // Keep only max items
            if (searchHistory.length > MAX_HISTORY_ITEMS) {
                searchHistory = searchHistory.slice(0, MAX_HISTORY_ITEMS);
            }

            saveSearchHistory();
            renderSearchHistory();
        }

        // Remove single item from history
        function removeFromHistory(index) {
            searchHistory.splice(index, 1);
            saveSearchHistory();
            renderSearchHistory();

            if (searchHistory.length === 0) {
                hideAllDropdowns();
            }
        }

        // Clear all history
        function clearAllHistory() {
            searchHistory = [];
            saveSearchHistory();
            renderSearchHistory();
            hideAllDropdowns();
        }

        // Render search history
        function renderSearchHistory() {
            const historyList = document.getElementById('searchHistoryList');

            if (searchHistory.length === 0) {
                historyList.innerHTML = '<li class="no-history">No recent searches</li>';
                return;
            }

            historyList.innerHTML = searchHistory.map((item, index) => `
                <li class="search-history-item" onclick="selectFromHistory('${item.replace(/'/g, "\'")}')">
                    <span class="material-icons history-icon">history</span>
                    <span class="history-text">${escapeHtml(item)}</span>
                    <button class="history-delete-btn" onclick="event.stopPropagation(); removeFromHistory(${index})">
                        <span class="material-icons">close</span>
                    </button>
                </li>
            `).join('');
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Show search suggestions dropdown
        function showSearchSuggestions(suggestions) {
            const section = document.getElementById('searchSuggestionsSection');
            const overlay = document.getElementById('dropdownOverlay');
            const suggestionsList = document.getElementById('suggestionsList');

            if (suggestions.length === 0) {
                hideAllDropdowns();
                return;
            }

            const query = document.getElementById('searchInput').value.trim().toLowerCase();

            suggestionsList.innerHTML = suggestions.map(item => {
                // Highlight matching text
                const text = item.text;
                const lowerText = text.toLowerCase();
                const index = lowerText.indexOf(query);

                let highlightedText;
                if (index !== -1) {
                    const before = text.substring(0, index);
                    const match = text.substring(index, index + query.length);
                    const after = text.substring(index + query.length);
                    highlightedText = `${escapeHtml(before)}<span class="suggestion-highlight">${escapeHtml(match)}</span>${escapeHtml(after)}`;
                } else {
                    highlightedText = escapeHtml(text);
                }

                return `
                    <li class="suggestion-item" onclick="selectSuggestion('${text.replace(/'/g, "\'")}')">
                        <span class="material-icons suggestion-icon">search</span>
                        <span class="suggestion-text">${highlightedText}</span>
                        <span class="suggestion-type">${escapeHtml(item.type)}</span>
                    </li>
                `;
            }).join('');

            section.classList.add('active');
            overlay.classList.add('active');

            // Hide history when showing suggestions
            document.getElementById('searchHistorySection').classList.remove('active');
        }

        // Show search history dropdown
        function showSearchHistory() {
            const section = document.getElementById('searchHistorySection');
            const overlay = document.getElementById('dropdownOverlay');

            // Hide suggestions
            document.getElementById('searchSuggestionsSection').classList.remove('active');

            section.classList.add('active');
            overlay.classList.add('active');

            renderSearchHistory();
        }

        // Hide all dropdowns
        function hideAllDropdowns() {
            document.getElementById('searchSuggestionsSection').classList.remove('active');
            document.getElementById('searchHistorySection').classList.remove('active');
            document.getElementById('dropdownOverlay').classList.remove('active');
            document.getElementById('searchIconBtn').classList.remove('active');
        }

        // Select suggestion
        function selectSuggestion(text) {
            document.getElementById('searchInput').value = text;
            document.getElementById('clearBtn').classList.add('visible');
            hideAllDropdowns();
            executeSearch();
        }

        // Select item from history
        function selectFromHistory(term) {
            document.getElementById('searchInput').value = term;
            document.getElementById('clearBtn').classList.add('visible');
            hideAllDropdowns();
            executeSearch();
        }

        // Generate search suggestions from apps
        function generateSuggestions(query) {
            if (!query || query.trim() === '') return [];

            const lowerQuery = query.toLowerCase().trim();
            const suggestions = new Set();

            // Search in app names, developers, and categories
            allApps.forEach(app => {
                // App name suggestions
                if (app.name && app.name.toLowerCase().includes(lowerQuery)) {
                    suggestions.add(JSON.stringify({ text: app.name, type: 'project' }));
                }

                // Developer suggestions
                if (app.developer && app.developer.toLowerCase().includes(lowerQuery)) {
                    suggestions.add(JSON.stringify({ text: app.developer, type: 'Developer' }));
                }

                // Category suggestions
                if (app.category && app.category.toLowerCase().includes(lowerQuery)) {
                    suggestions.add(JSON.stringify({ text: app.category, type: 'Category' }));
                }

                // Tags/keywords if available
                if (app.tags && Array.isArray(app.tags)) {
                    app.tags.forEach(tag => {
                        if (tag.toLowerCase().includes(lowerQuery)) {
                            suggestions.add(JSON.stringify({ text: tag, type: 'Tag' }));
                        }
                    });
                }
            });

            // Also check search history for suggestions
            searchHistory.forEach(item => {
                if (item.toLowerCase().includes(lowerQuery)) {
                    suggestions.add(JSON.stringify({ text: item, type: 'History' }));
                }
            });

            // Convert back to objects and limit
            let result = Array.from(suggestions).map(s => JSON.parse(s));

            // Sort: prioritize exact matches and starts with
            result.sort((a, b) => {
                const aLower = a.text.toLowerCase();
                const bLower = b.text.toLowerCase();
                const aExact = aLower === lowerQuery;
                const bExact = bLower === lowerQuery;
                const aStarts = aLower.startsWith(lowerQuery);
                const bStarts = bLower.startsWith(lowerQuery);

                if (aExact && !bExact) return -1;
                if (bExact && !aExact) return 1;
                if (aStarts && !bStarts) return -1;
                if (bStarts && !aStarts) return 1;
                return a.text.length - b.text.length;
            });

            return result.slice(0, MAX_SUGGESTIONS);
        }

        // Load all apps
        database.ref('apps').on('value', (snapshot) => {
            const apps = snapshot.val();
            if (apps) {
                allApps = Object.entries(apps).map(([id, app]) => ({ id, ...app }));
            }
        });

        // Search input
        const searchInput = document.getElementById('searchInput');
        const clearBtn = document.getElementById('clearBtn');
        const searchIconBtn = document.getElementById('searchIconBtn');

        // Show history when input is focused and empty
        searchInput.addEventListener('focus', () => {
            if (searchInput.value.trim() === '' && searchHistory.length > 0) {
                showSearchHistory();
            }
        });

        // Handle input - show suggestions but DON'T search yet
        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.trim();
            clearBtn.classList.toggle('visible', query.length > 0);

            if (query.length > 0) {
                // Generate and show suggestions
                const suggestions = generateSuggestions(query);
                if (suggestions.length > 0) {
                    showSearchSuggestions(suggestions);
                } else {
                    hideAllDropdowns();
                }
            } else {
                // Show history when cleared
                hideAllDropdowns();
                if (searchHistory.length > 0) {
                    showSearchHistory();
                }
            }
        });

        // Handle Enter key - execute search
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const query = e.target.value.trim();
                if (query) {
                    hideAllDropdowns();
                    addToHistory(query);
                    executeSearch();
                }
            }
        });

        // Execute search (when clicking search icon or pressing enter)
        function executeSearch() {
            const query = searchInput.value.trim();

            if (!query) {
                showSuggestions();
                return;
            }

            // Add to history
            addToHistory(query);

            // Activate search icon
            searchIconBtn.classList.add('active');

            // Perform actual search
            performSearch(query);
        }

        function clearSearch() {
            searchInput.value = '';
            clearBtn.classList.remove('visible');
            searchIconBtn.classList.remove('active');
            showSuggestions();
            searchInput.focus();
            if (searchHistory.length > 0) {
                showSearchHistory();
            }
        }

        function quickSearch(term) {
            searchInput.value = term;
            clearBtn.classList.add('visible');
            hideAllDropdowns();
            executeSearch();
        }

        function showSuggestions() {
            document.getElementById('suggestionsSection').style.display = 'block';
            document.getElementById('resultsContainer').style.display = 'none';
            document.getElementById('emptyState').style.display = 'block';
            document.getElementById('emptyState').innerHTML = `
                <span class="material-icons">search</span>
                <h3>Search for apps</h3>
                <p>Type to find your favorite apps. Click the search icon to search.</p>
            `;
        }

        function performSearch(query) {
            if (!query) {
                showSuggestions();
                return;
            }

            const lowerQuery = query.toLowerCase();
            const results = allApps.filter(app => 
                app.name?.toLowerCase().includes(lowerQuery) ||
                app.developer?.toLowerCase().includes(lowerQuery) ||
                app.category?.toLowerCase().includes(lowerQuery) ||
                app.description?.toLowerCase().includes(lowerQuery)
            );

            document.getElementById('suggestionsSection').style.display = 'none';
            document.getElementById('resultsContainer').style.display = 'block';

            const resultsList = document.getElementById('resultsList');

            if (results.length === 0) {
                document.getElementById('emptyState').style.display = 'block';
                document.getElementById('emptyState').innerHTML = `
                    <span class="material-icons">search_off</span>
                    <h3>No results found</h3>
                    <p>Try different keywords</p>
                `;
                resultsList.innerHTML = '';
                return;
            }

            document.getElementById('emptyState').style.display = 'none';

            resultsList.innerHTML = results.map(app => `
                <div class="result-item" onclick="openApp('${app.id}')">
                    <div class="result-icon">
                        <img src="${app.icon || 'https://via.placeholder.com/64'}" alt="${app.name}">
                    </div>
                    <div class="result-info">
                        <div class="result-name">${app.name}</div>
                        <div class="result-developer">${app.developer || 'Unknown'}</div>
                        <div class="result-meta">
                            <span><span class="material-icons">star</span>${app.rating || '0.0'}</span>
                            <span><span class="material-icons">download</span>${formatNumber(app.downloads || 0)}</span>
                            <span><span class="material-icons">favorite</span>${formatNumber(app.likes || 0)}</span>
                        </div>
                        ${app.screenshots ? `
                            <div class="toggle-screenshots" onclick="toggleScreenshots(event, '${app.id}')">
                                <span class="material-icons">${showScreenshots[app.id] ? 'expand_less' : 'expand_more'}</span>
                                ${showScreenshots[app.id] ? 'Hide screenshots' : 'Show screenshots'}
                            </div>
                            ${showScreenshots[app.id] ? `
                                <div class="screenshots-preview">
                                    ${app.screenshots.slice(0, 3).map(url => `
                                        <div class="screenshot-thumb">
                                            <img src="${url}" alt="Screenshot">
                                        </div>
                                    `).join('')}
                                </div>
                            ` : ''}
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }

        function toggleScreenshots(event, appId) {
            event.stopPropagation();
            showScreenshots[appId] = !showScreenshots[appId];
            performSearch(searchInput.value.trim());
        }

        function openApp(appId) {
            window.location.href = `app-details.html?id=${appId}`;
        }

        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num;
        }

        // Focus search on load and load history
        window.addEventListener('load', () => {
            searchInput.focus();
            loadSearchHistory();

            // Show history if exists
            if (searchHistory.length > 0) {
                showSearchHistory();
            }
        });

        // Hide dropdowns when clicking outside
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-bar') && 
                !e.target.closest('.search-suggestions-section') && 
                !e.target.closest('.search-history-section')) {
                hideAllDropdowns();
            }
        });
    </script>
