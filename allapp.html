        * {

        :root {

            --shadow-2: 0 1px 2px 0 rgba(60,64,67,0.3), 0 2px 6px 2px rgba(60,64,67,0.15);
        }
        
        [data-theme="dark"] {
            --background: #0B121E;
            --surface: #121A2A;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --divider: #333333;
        }
        
        body {
            font-family: 'Roboto', sans-serif;
            background: var(--background);
            color: var(--text-primary);
            min-height: 100vh;
            padding-bottom: 80px;
        }
        
        /* App Bar */
        .app-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: var(--surface);
            display: flex;
            align-items: center;
            padding: 0 16px;
            box-shadow: var(--shadow-1);
            z-index: 100;
        }
        
        .back-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: transparent;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .back-btn .material-icons {
            font-size: 24px;
            color: var(--text-primary);
        }
        
        .app-title {
            flex: 1;
            font-size: 20px;
            font-weight: 600;
            margin-left: 16px;
        }
        
        /* Filter Tabs */
        .filter-tabs {
            position: fixed;
            top: 64px;
            left: 0;
            right: 0;
            background: var(--surface);
            display: flex;
            gap: 8px;
            padding: 12px 16px;
            overflow-x: auto;
            scrollbar-width: none;
            box-shadow: var(--shadow-1);
            z-index: 99;
        }
        
        .filter-tabs::-webkit-scrollbar {
            display: none;
        }
        
        .filter-tab {
            padding: 8px 20px;
            border: 1px solid var(--divider);
            background: var(--surface);
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        
        .filter-tab.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        /* Main Content */
        .main-content {
            margin-top: 140px;
            padding: 16px 16px;
        }
        
        /* Apps Grid */
        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 16px;
        }
        
        .app-card {
            background: var(--surface);
            border-radius: 12px;
            padding: 16px;
            box-shadow: var(--shadow-1);
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .app-card:hover {
            box-shadow: var(--shadow-2);
            transform: translateY(-4px);
        }
        
        .app-icon {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            overflow: hidden;
            margin: 0 auto 12px;
            box-shadow: var(--shadow-1);
            position: relative;
            background: linear-gradient(135deg, #e0e0e0 0%, #f0f0f0 100%);
        }
        
        [data-theme="dark"] .app-icon {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }
        
        .app-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.5s ease-in-out, transform 0.5s ease;
            transform: scale(1.1);
        }
        
        .app-icon img.loaded {
            opacity: 1;
            transform: scale(1);
        }
        
        .app-icon .placeholder-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 32px;
            color: var(--text-secondary);
            opacity: 0.3;
        }
        
        .app-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 4px;
        }
        
        .app-developer {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 8px;
        }
        
        .app-stats {
            display: flex;
            justify-content: center;
            gap: 12px;
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        .app-stats span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .app-stats .material-icons {
            font-size: 14px;
            color: #ffb300;
        }
        
        /* List View */
        .apps-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .app-list-item {
            background: var(--surface);
            border-radius: 12px;
            padding: 16px;
            box-shadow: var(--shadow-1);
            display: flex;
            gap: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .app-list-item:hover {
            box-shadow: var(--shadow-2);
        }
        
        .app-list-icon {
            width: 64px;
            height: 64px;
            border-radius: 16px;

        .app-list-icon img {

        .app-list-icon .placeholder-icon {

            font-size: 24px;
            color: var(--text-secondary);
            opacity: 0.3;
        }
        
        .app-list-info {
            flex: 1;

        }
        
        .app-list-name {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-primary);

        .app-list-developer {

        }
        
        .app-list-meta {
            display: flex;
            gap: 16px;
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        .app-list-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .app-list-meta .material-icons {
            font-size: 14px;

        .app-list-download {
            display: flex;

            justify-content: center;
            width: 48px;
            height: 48px;
            background: var(--primary);
            border-radius: 50%;
            color: white;
            flex-shrink: 0;
        }
        
        /* Progressive Image Loading Animations */
        @keyframes shimmer {
            0% { background-position: -200px 0; }
            100% { background-position: 200px 0; }
        }
        
        .img-skeleton {
            background: linear-gradient(90deg, 
                var(--background) 25%, 
                var(--surface) 50%, 
                var(--background) 75%
            );
            background-size: 200px 100%;
            animation: shimmer 1.5s infinite;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        .progressive-image-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        .progressive-image-wrapper img {
            position: relative;
            z-index: 2;
        }
        
        /* View Toggle */
        .view-toggle {
            position: fixed;
            bottom: 80px;
            right: 16px;
            width: 56px;
            height: 56px;
            background: var(--primary);
            border: none;
            border-radius: 50%;
            color: white;
            box-shadow: var(--shadow-2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 90;
            transition: all 0.2s;
        }
        
        .view-toggle:hover {
            transform: scale(1.1);
        }
        
        .view-toggle .material-icons {
            font-size: 24px;
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 64px 24px;
            color: var(--text-secondary);
        }
        
        .empty-state .material-icons {
            font-size: 80px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        .empty-state h3 {
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-primary);
        }
        
        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: var(--surface);
            box-shadow: 0 -1px 2px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
        }
        
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 16px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.2s;
        }
        
        .nav-item.active {
            color: var(--primary);
        }
        
        .nav-item .material-icons {
            font-size: 24px;
        }
        
        .nav-item span:last-child {
            font-size: 11px;
            font-weight: 500;
        }
        
        /* Blur effect for progressive loading */
        .blur-load {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        
        .blur-load.loaded > img {
            opacity: 1;
        }
        
        .blur-load > img {
            opacity: 0;
            transition: opacity 200ms ease-in-out;
        }
    </style>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
           apiKey: "AIzaSyBQnUabSu6WGbq1te-hBEAYPZdOO93_Mfk",
           authDomain: "mega-store-2025.firebaseapp.com",
           databaseURL: "https://mega-store-2025-default-rtdb.firebaseio.com",
           projectId: "mega-store-2025",
           storageBucket: "mega-store-2025.firebasestorage.app",
           messagingSenderId: "190838364165",
           appId: "1:190838364165:web:43a969b7b852777061e46c",
           measurementId: "G-CZR2N1HF9K"
           };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        // State
        let currentFilter = 'all';
        let isGridView = true;
        let allApps = [];
        let imageObserver;
        
        // Check theme
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        
        // Initialize Progressive Image Loading
        function initImageObserver() {
            const options = {
                root: null,
                rootMargin: '50px',
                threshold: 0.1
            };
            
            imageObserver = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        loadImage(entry.target);
                        observer.unobserve(entry.target);
                    }
                });
            }, options);
        }
        
        function loadImage(imgContainer) {
            const img = imgContainer.querySelector('img');
            const skeleton = imgContainer.querySelector('.img-skeleton');
            const placeholder = imgContainer.querySelector('.placeholder-icon');
            
            if (!img || !img.dataset.src) return;
            
            const tempImage = new Image();
            
            tempImage.onload = function() {
                img.src = tempImage.src;
                img.classList.add('loaded');
                
                // Remove skeleton and placeholder with fade out
                if (skeleton) {
                    skeleton.style.opacity = '0';
                    skeleton.style.transition = 'opacity 0.3s ease';
                    setTimeout(() => skeleton.remove(), 300);
                }
                
                if (placeholder) {
                    placeholder.style.opacity = '0';
                    placeholder.style.transition = 'opacity 0.3s ease';
                    setTimeout(() => placeholder.remove(), 300);
                }
            };
            
            tempImage.onerror = function() {
                // Show error state or keep placeholder
                if (placeholder) {
                    placeholder.textContent = 'broken_image';
                    placeholder.style.opacity = '0.5';
                }
                if (skeleton) skeleton.remove();
            };
            
            // Start loading
            tempImage.src = img.dataset.src;
        }
        
        // Create Progressive Image HTML
        function createProgressiveImage(src, alt, size = '80') {
            const placeholder = 'https://via.placeholder.com/' + size + '/e0e0e0/999999?text=...';
            return `
                <div class="progressive-image-wrapper">
                    <div class="img-skeleton"></div>
                    <span class="material-icons placeholder-icon">image</span>
                    <img data-src="${src || placeholder}" 
                         alt="${alt}" 
                         loading="lazy"
                         onerror="this.src='${placeholder}'">
                </div>
            `;
        }
        
        // Load apps
        loadApps();
        
        // Check URL params for category
        const urlParams = new URLSearchParams(window.location.search);
        const categoryParam = urlParams.get('category');
        if (categoryParam) {
            filterApps(categoryParam);
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.classList.remove('active');
                if (tab.textContent.toLowerCase().includes(categoryParam)) {
                    tab.classList.add('active');
                }
            });
        }
        
        function loadApps() {
            // Initialize observer first
            initImageObserver();
            
            database.ref('apps').on('value', (snapshot) => {
                const apps = snapshot.val();
                if (apps) {
                    allApps = Object.entries(apps).map(([id, app]) => ({ id, ...app }));
                    renderApps();
                } else {
                    document.getElementById('appsContainer').innerHTML = `
                        <div class="empty-state" style="grid-column: 1/-1;">
                            <span class="material-icons">inbox</span>
                            <h3>No apps available</h3>
                        </div>
                    `;
                }
            });
        }
        
        function filterApps(category) {
            currentFilter = category;
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.classList.remove('active');
                if (tab.textContent.toLowerCase() === category || 
                    (category === 'all' && tab.textContent === 'All')) {
                    tab.classList.add('active');
                }
            });
            renderApps();
        }
        
        function renderApps() {
            const container = document.getElementById('appsContainer');
            let filteredApps = allApps;
            
            if (currentFilter !== 'all') {
                filteredApps = allApps.filter(app => app.category === currentFilter);
            }
            
            if (filteredApps.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <span class="material-icons">inbox</span>
                        <h3>No apps in this category</h3>
                    </div>
                `;
                return;
            }
            
            if (isGridView) {
                container.className = 'apps-grid';
                container.innerHTML = filteredApps.map(app => `
                    <div class="app-card" onclick="openApp('${app.id}')">
                        <div class="app-icon">
                            ${createProgressiveImage(app.icon, app.name, '80')}
                        </div>
                        <div class="app-name">${app.name}</div>
                        <div class="app-developer">${app.developer || 'Unknown'}</div>
                        <div class="app-stats">
                            <span><span class="material-icons">star</span>${app.rating || '0.0'}</span>
                            <span><span class="material-icons">download</span>${formatNumber(app.downloads || 0)}</span>
                        </div>
                    </div>
                `).join('');
            } else {
                container.className = 'apps-list';
                container.innerHTML = filteredApps.map(app => `
                    <div class="app-list-item" onclick="openApp('${app.id}')">
                        <div class="app-list-icon">
                            ${createProgressiveImage(app.icon, app.name, '64')}
                        </div>
                        <div class="app-list-info">
                            <div class="app-list-name">${app.name}</div>
                            <div class="app-list-developer">${app.developer || 'Unknown'}</div>
                            <div class="app-list-meta">
                                <span><span class="material-icons">star</span>${app.rating || '0.0'}</span>
                                <span><span class="material-icons">download</span>${formatNumber(app.downloads || 0)}</span>
                                <span><span class="material-icons">visibility</span>${formatNumber(app.views || 0)}</span>
                            </div>
                        </div>
                        <div class="app-list-download">
                            <span class="material-icons">download</span>
                        </div>
                    </div>
                `).join('');
            }
            
            // Observe all new images
            setTimeout(() => {
                document.querySelectorAll('.progressive-image-wrapper').forEach(wrapper => {
                    imageObserver.observe(wrapper);
                });
            }, 100);
        }
        
        function toggleView() {
            isGridView = !isGridView;
            document.getElementById('viewIcon').textContent = isGridView ? 'view_list' : 'grid_view';
            renderApps();
        }
        
        function openApp(appId) {
            window.location.href = `app-details.html?id=${appId}`;
        }
        
        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num;
        }
        
        // Preload images for visible viewport on initial load
        window.addEventListener('load', () => {
            document.querySelectorAll('.progressive-image-wrapper').forEach((wrapper, index) => {
                if (index < 6) { // Load first 6 images immediately
                    loadImage(wrapper);
                    imageObserver.unobserve(wrapper);
                }
            });
        });
    </script>
